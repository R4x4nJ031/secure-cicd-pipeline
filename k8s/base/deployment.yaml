apiVersion: apps/v1
kind: Deployment
metadata:
  name: clean-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: clean-app
  template:
    metadata:
      labels:
        app: clean-app
    spec:
      containers:
        - name: clean-app
          image: clean-app
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
