name: Clean App CI

on:
  push:
    branches:
      - main
  pull_request:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: r4x4nj031/secure-cicd-pipeline/clean-app

jobs:
  secret-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        run: |
          mkdir -p reports
          docker run --rm \
            -v "${{ github.workspace }}:/repo" \
            ghcr.io/gitleaks/gitleaks:latest \
            dir /repo \
            --report-format sarif \
            --report-path /repo/reports/gitleaks.sarif

      - name: Upload Gitleaks report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-report
          path: reports/gitleaks.sarif

  sast-scan:
    runs-on: ubuntu-latest
    needs: secret-scan

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Semgrep
        run: |
          mkdir -p reports
          docker run --rm \
            -v "${{ github.workspace }}:/repo" \
            semgrep/semgrep:latest \
            semgrep scan \
            --config /repo/semgrep-rules/javascript.yml \
            --error \
            --sarif \
            --output /repo/reports/semgrep.sarif \
            /repo/apps/clean-app/src

      - name: Upload Semgrep report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-report
          path: reports/semgrep.sarif

  dependency-audit:
    runs-on: ubuntu-latest
    needs: secret-scan

    defaults:
      run:
        working-directory: apps/clean-app

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/clean-app/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Run npm audit
        run: |
          mkdir -p ../../reports
          npm audit --audit-level=high --json > ../../reports/npm-audit.json

      - name: Upload npm audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: npm-audit-report
          path: reports/npm-audit.json

  test-clean-app:
    runs-on: ubuntu-latest
    needs:
      - secret-scan
      - sast-scan
      - dependency-audit

    defaults:
      run:
        working-directory: apps/clean-app

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/clean-app/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test

  build-and-scan-image:
    runs-on: ubuntu-latest
    needs: test-clean-app
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image reference
        run: |
          echo "IMAGE_REF=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}" >> "$GITHUB_ENV"
          echo "IMAGE_REF_MAIN=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:main" >> "$GITHUB_ENV"

      - name: Build clean app image
        run: |
          docker build \
            -t "${IMAGE_REF}" \
            -t "${IMAGE_REF_MAIN}" \
            ./apps/clean-app

      - name: Push clean app image
        run: |
          docker push "${IMAGE_REF}"
          docker push "${IMAGE_REF_MAIN}"

      - name: Resolve image digest
        run: |
          DIGEST="$(docker inspect --format='{{index .RepoDigests 0}}' "${IMAGE_REF}")"
          echo "IMAGE_DIGEST=${DIGEST}" >> "$GITHUB_ENV"

      - name: Generate SBOM with Syft
        run: |
          mkdir -p reports
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v "${{ github.workspace }}:/workspace" \
            anchore/syft:v0.104.0 \
            "${IMAGE_DIGEST}" \
            -o json=/workspace/reports/sbom-clean-app.json

      - name: Scan image with Trivy
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v "${{ github.workspace }}:/workspace" \
            aquasec/trivy:0.69.3 \
            image \
            --scanners vuln \
            --ignorefile /workspace/.trivyignore \
            --severity HIGH,CRITICAL \
            --exit-code 1 \
            --format json \
            --output /workspace/reports/trivy-clean-app.json \
            "${IMAGE_DIGEST}"

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image with Cosign keyless signing
        env:
          COSIGN_YES: "true"
        run: cosign sign "${IMAGE_DIGEST}"

      - name: Verify image signature
        run: |
          cosign verify \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \
            --certificate-identity "https://github.com/${{ github.repository }}/.github/workflows/ci.yml@refs/heads/main" \
            "${IMAGE_DIGEST}"

      - name: Upload SBOM
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sbom-clean-app
          path: reports/sbom-clean-app.json

      - name: Upload Trivy report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-clean-app-report
          path: reports/trivy-clean-app.json
